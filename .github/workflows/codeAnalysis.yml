name: Code Analysis
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover_files:
    name: Discover main-*.typ files
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.find_files.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Find main-*.typ files
        id: find_files
        run: |
          FILES=$({
            ls template/main-*.typ 2>/dev/null | while read f; do
              basename="${f##*/}"
              name="${basename%.typ}"
              echo "{\"file\":\"$name\",\"path\":\"$f\"}"
            done
            echo '{"file":"documentation","path":"documentation.typ"}'
          } | jq -s -c '.')
          echo "matrix=${FILES}" >> "$GITHUB_OUTPUT"

  discover_versions:
    name: Discover Typst versions
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.read_versions.outputs.versions }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Read supported-typst-versions.json
        id: read_versions
        run: |
          VERSIONS=$(jq -c '.' .github/supported-typst-versions.json)
          echo "versions=${VERSIONS}" >> "$GITHUB_OUTPUT"

  check_formatting:
    name: Check Formatting
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install typstyle
        run: |
          curl -L https://github.com/typstyle-rs/typstyle/releases/download/v0.15.0/typstyle-x86_64-unknown-linux-gnu -o typstyle
          chmod +x typstyle
      - name: Typstyle version
        run: ./typstyle --version
      - name: Run formatting check
        run: |
          ./typstyle ./template --check

  check_build:
    name: Check Build (${{ matrix.file_entry.file }}, typst ${{ matrix.typst_version }})
    needs: [discover_files, discover_versions]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        file_entry: ${{ fromJson(needs.discover_files.outputs.matrix) }}
        typst_version: ${{ fromJson(needs.discover_versions.outputs.versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install typst
        uses: typst-community/setup-typst@63ac138db421d586de61f7f5ac3bcef6a2e6c78c # v5.1.0
        with:
          typst-version: ${{ fromJson(needs.discover_versions.outputs.versions)[0] }}
      - name: Typst version
        run: typst --version
      - name: Build template
        run: typst compile ${{ matrix.file_entry.path }}

  check_build_results:
    name: Check Build Result
    needs: check_build
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Fail if any build failed
        if: needs.check_build.result != 'success'
        run: exit 1

  check_pdf:
    name: Check PDF parity (${{ matrix.file }})
    needs: [discover_files, discover_versions]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover_files.outputs.matrix) }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: new
      - name: Install typst
        uses: typst-community/setup-typst@63ac138db421d586de61f7f5ac3bcef6a2e6c78c # v5.1.0
        with:
          typst-version: ${{ fromJson(needs.discover_versions.outputs.versions)[0] }}
      - name: Typst version
        run: typst --version
      - name: Build PDF on PR branch
        run: |
          typst compile new/${{ matrix.path }} new.pdf
      - name: Checkout base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.base_ref || 'main' }}
          path: old
      - name: Build PDF on main branch
        run: |
          typst compile old/${{ matrix.path }} old.pdf
      - name: Compare PDFs
        id: diff_check
        uses: nowsprinting/diff-pdf-action@21193e71055e9cd98ae8704bf95590e50fb0d3c3 # v1.2.3
        continue-on-error: true
        with:
          file1: old.pdf
          file2: new.pdf
          options: --skip-identical --mark-differences --output-diff=diff-${{ matrix.file }}.pdf
          suppress-diff-error: false
      - name: Upload diff.pdf artifact
        if: steps.diff_check.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: diff-pdf-${{ matrix.file }}
          path: diff-${{ matrix.file }}.pdf

  upload_pr_number:
    name: Upload PR number
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - name: Save and upload PR number
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt
      - name: Upload PR number artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-number
          path: pr-number.txt
