name: Comment PDF diff results
on:
  workflow_run:
    workflows: ["Code Analysis"]
    types: [completed]

jobs:
  comment_pdf_diff:
    name: Comment PDF diff results
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.event == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download diff PDFs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          github-token: ${{ secrets.BOT_PAT }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: diff-pdf-*
          path: diffs
          merge-multiple: true
      - name: Download PR number
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ secrets.BOT_PAT }}
          run-id: ${{ github.event.workflow_run.id }}
          name: pr-number
      - name: Read PR number
        id: pr
        run: echo "number=$(cat pr-number.txt)" >> "$GITHUB_OUTPUT"
      - name: Build comment body
        id: build_comment
        run: |
          HAS_DIFF=false
          BODY="> [!NOTE]"
          BODY="${BODY}\n> **PDF Differences Detected**"
          BODY="${BODY}\n>"
          BODY="${BODY}\n> The following PDF outputs have changed between the base branch and this PR:"
          BODY="${BODY}\n>"

          for diff in diffs/diff-*; do
            if [[ ! -f "$diff" ]]; then
              continue
            fi

            file_name=$(basename "$diff" .pdf | sed 's/^diff-pdf-//')
            echo "Found diff for ${file_name}"
            BODY="${BODY}\n> - \`${file_name}\` — download [\`diff-pdf-${file_name}.pdf\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }})"
            HAS_DIFF=true
          done

          echo "has_diff=${HAS_DIFF}" >> "$GITHUB_OUTPUT"
          echo -e "$BODY" > comment-body.md
      - name: Create or update sticky comment
        if: steps.build_comment.outputs.has_diff == 'true'
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: pdf-diff
          number: ${{ steps.pr.outputs.number }}
          path: comment-body.md
      - name: Delete sticky comment if no diffs
        if: steps.build_comment.outputs.has_diff == 'false'
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: pdf-diff
          number: ${{ steps.pr.outputs.number }}
          delete: true
