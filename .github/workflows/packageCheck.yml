name: Package Check
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package_check:
    name: Check package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: "./repo"

      - name: Install typst
        uses: typst-community/setup-typst@63ac138db421d586de61f7f5ac3bcef6a2e6c78c # v5.1.0
        with:
          typst-version: 0.14.2

      - name: Fetch all @preview packages for package-check
        run: |
          typst compile --format pdf repo/template/main-dhbw-ka.typ /dev/null

      - name: Install package locally
        run: ./scripts/package_template.sh -t ../package
        working-directory: ./repo

      - name: Run package check
        # PACKAGE_DIR is set in package_template.sh
        run: docker run -v ${{ env.PACKAGE_DIR }}:/data ghcr.io/typst/package-check check
